services:
  backend:
    build: .
    container_name: backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./servicedesk.db
      - SECRET_KEY=servicedesk12345678901234567890
    volumes:
      - db-data:/code
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  db-data:

networks:
  app-network:
    driver: bridge