<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal - Service Desk</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/agent.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .client-layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            height: 100vh;
            background: var(--bg-primary);
        }
        .client-sidebar {
            background: rgba(255, 255, 255, 0.03);
            border-right: 1px solid var(--glass-border);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .client-main {
            padding: 2rem 3rem;
            overflow-y: auto;
        }
        .client-nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }
        .client-nav-item:hover, .client-nav-item.active {
            background: rgba(0,212,255,0.1);
            color: white;
        }
        .client-nav-item.active i { color: var(--jarvis-cyan); }
        .ticket-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 1.25rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .ticket-card:hover {
            transform: translateY(-2px);
            border-color: var(--jarvis-cyan);
            background: rgba(0,212,255,0.05);
        }
        .ticket-status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .simple-form {
            max-width: 600px;
        }
        .simple-form .form-group {
            margin-bottom: 1.5rem;
        }
        .simple-form label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .simple-form input,
        .simple-form select,
        .simple-form textarea {
            width: 100%;
            padding: 0.85rem 1rem;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 10px;
            color: white;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        .simple-form input:focus,
        .simple-form select:focus,
        .simple-form textarea:focus {
            outline: none;
            border-color: var(--jarvis-cyan);
            box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
        }
        .simple-form textarea {
            resize: vertical;
            min-height: 150px;
        }
        .btn-create {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--jarvis-cyan), #0099cc);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-create:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,212,255,0.3);
        }
        .btn-create:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }
        .empty-state i {
            font-size: 4rem;
            opacity: 0.3;
            margin-bottom: 1rem;
        }
        .ticket-card.awaiting-confirmation {
            border-color: #8b5cf6;
            background: rgba(139, 92, 246, 0.08);
            animation: pulse-border 2s infinite;
        }
        @keyframes pulse-border {
            0%, 100% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(139, 92, 246, 0); }
        }
        .action-hint {
            color: #8b5cf6;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .action-hint i {
            margin-right: 0.25rem;
        }
        .closed-hint {
            color: #10b981;
            font-size: 0.75rem;
        }
        .closed-hint i {
            margin-right: 0.25rem;
        }
        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--jarvis-cyan), #0099cc);
            color: white;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .btn-small {
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="client-layout">
        <aside class="client-sidebar">
            <div class="logo" style="margin-bottom: 1rem; padding: 0.5rem;">
                <div style="display: flex; align-items: center; gap: 0.75rem;">
                    <div class="logo-icon-small">🎫</div>
                    <span style="font-size: 1.1rem; font-weight: 600;">Support</span>
                </div>
            </div>

            <nav style="flex: 1;">
                <div class="client-nav-item active" data-view="dashboard">
                    <i class="fa-solid fa-list"></i>
                    <span>Мои заявки</span>
                </div>
                <div class="client-nav-item" data-view="new-ticket">
                    <i class="fa-solid fa-plus-circle"></i>
                    <span>Новая заявка</span>
                </div>
                <div class="client-nav-item" data-view="assets">
                    <i class="fa-solid fa-desktop"></i>
                    <span>Оборудование</span>
                </div>
            </nav>

            <div style="border-top: 1px solid var(--glass-border); padding-top: 1rem;">
                <div id="clientName" style="font-weight: 600; margin-bottom: 0.75rem; font-size: 0.9rem;">-</div>
                <button class="btn btn-secondary btn-small" id="logoutBtn" style="width: 100%;">
                    <i class="fa-solid fa-sign-out-alt"></i> Выйти
                </button>
            </div>
        </aside>

        <main class="client-main">
            <!-- Dashboard -->
            <div id="dashboardView">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h1 style="font-size: 1.5rem; margin: 0;">Ваши обращения</h1>
                    <button class="btn btn-primary" id="createNewBtn">
                        <i class="fa-solid fa-plus"></i> Новая заявка
                    </button>
                </div>
                <div id="clientTicketsList"></div>
            </div>

            <!-- New Ticket -->
            <div id="newTicketView" class="hidden">
                <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem;">
                    <button class="btn btn-secondary btn-small" onclick="switchView('dashboard')" style="padding: 0.5rem 1rem;">
                        <i class="fa-solid fa-arrow-left"></i>
                    </button>
                    <h1 style="font-size: 1.5rem; margin: 0;">Новое обращение</h1>
                </div>

                <div class="glass-card simple-form">
                    <div class="form-group">
                        <label><i class="fa-solid fa-heading" style="color: var(--jarvis-cyan); margin-right: 0.5rem;"></i>Тема обращения</label>
                        <input type="text" id="ticketTitle" placeholder="Кратко опишите проблему">
                    </div>

                    <div class="form-group">
                        <label><i class="fa-solid fa-align-left" style="color: var(--jarvis-cyan); margin-right: 0.5rem;"></i>Подробности</label>
                        <textarea id="ticketDescription" placeholder="Опишите проблему максимально подробно..."></textarea>
                    </div>

                    <div class="form-group">
                        <label><i class="fa-solid fa-flag" style="color: var(--jarvis-cyan); margin-right: 0.5rem;"></i>Срочность</label>
                        <select id="ticketPriority">
                            <option value="low">🔵 Низкая - не срочно</option>
                            <option value="medium" selected>🟡 Средняя - обычная</option>
                            <option value="high">🟠 Высокая - нужно сегодня</option>
                            <option value="critical">🔴 Критичная - всё стоит!</option>
                        </select>
                    </div>

                    <button class="btn-create" id="submitBtn" onclick="createTicket()">
                        <i class="fa-solid fa-paper-plane"></i> Отправить заявку
                    </button>
                </div>
            </div>

            <!-- Assets -->
            <div id="assetsView" class="hidden">
                <h1 style="font-size: 1.5rem; margin-bottom: 2rem;">Моё оборудование</h1>
                <div class="empty-state">
                    <i class="fa-solid fa-desktop"></i>
                    <p>Оборудование не добавлено</p>
                </div>
            </div>
        </main>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="js/api.js?v=3.0"></script>
    <script src="js/features-api.js?v=3.0"></script>
    <script>
    let api = window.api;

    document.addEventListener('DOMContentLoaded', async function() {
        if (!api || !api.token) {
            window.location.href = 'index.html';
            return;
        }

        try {
            const user = await api.getMe();
            document.getElementById('clientName').textContent = user.full_name || user.email;
        } catch (e) {
            window.location.href = 'index.html';
            return;
        }

        loadTickets();

        document.getElementById('createNewBtn').addEventListener('click', function() {
            switchView('new-ticket');
        });

        document.getElementById('logoutBtn').addEventListener('click', function() {
            api.clearToken();
            window.location.href = 'index.html';
        });

        document.querySelectorAll('.client-nav-item').forEach(function(item) {
            item.addEventListener('click', function() {
                switchView(this.dataset.view);
            });
        });
    });

    function switchView(view) {
        document.getElementById('dashboardView').classList.add('hidden');
        document.getElementById('newTicketView').classList.add('hidden');
        document.getElementById('assetsView').classList.add('hidden');
        document.querySelectorAll('.client-nav-item').forEach(function(i) {
            i.classList.remove('active');
        });

        if (view === 'dashboard') {
            document.getElementById('dashboardView').classList.remove('hidden');
            document.querySelector('[data-view="dashboard"]').classList.add('active');
            loadTickets();
        } else if (view === 'new-ticket') {
            document.getElementById('newTicketView').classList.remove('hidden');
            document.querySelector('[data-view="new-ticket"]').classList.add('active');
        } else if (view === 'assets') {
            document.getElementById('assetsView').classList.remove('hidden');
            document.querySelector('[data-view="assets"]').classList.add('active');
        }
    }

    async function loadTickets() {
        var list = document.getElementById('clientTicketsList');
        list.innerHTML = '<div class="empty-state"><i class="fa-solid fa-spinner fa-spin"></i><p>Загрузка...</p></div>';

        try {
            var tickets = await api.getTickets();
            renderTickets(tickets);
        } catch (e) {
            list.innerHTML = '<div class="empty-state" style="color: #ef4444;"><i class="fa-solid fa-exclamation-triangle"></i><p>Ошибка загрузки</p></div>';
        }
    }

    function renderTickets(tickets) {
        var list = document.getElementById('clientTicketsList');

        if (!tickets || tickets.length === 0) {
            list.innerHTML = '<div class="empty-state"><i class="fa-solid fa-inbox"></i><p>У вас пока нет обращений</p><button class="btn btn-primary" onclick="switchView(\'new-ticket\')" style="margin-top: 1rem;"><i class="fa-solid fa-plus"></i> Создать обращение</button></div>';
            return;
        }

        var html = '';
        for (var i = 0; i < tickets.length; i++) {
            var t = tickets[i];
            var statusColor = getStatusColor(t.status_rel ? t.status_rel.name : 'новый');
            var date = new Date(t.created_at).toLocaleDateString('ru-RU', {day: '2-digit', month: '2-digit', year: 'numeric'});
            var isAwaitingClient = t.status_rel?.name === 'Ожидает клиента';
            var isClosed = t.status_rel?.is_final;
            
            var statusText = t.status_rel ? t.status_rel.name : 'Новый';
            if (statusText === 'Новый') statusText = 'Новая заявка';
            if (statusText === 'В работе') statusText = 'В работе';
            if (statusText === 'Ожидает клиента') statusText = 'Требуется ваше подтверждение';
            if (isClosed) statusText = 'Закрыта';

            html += '<div class="ticket-card ' + (isAwaitingClient ? 'awaiting-confirmation' : '') + '" onclick="viewTicket(' + t.id + ')">';
            html += '<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">';
            html += '<span style="font-weight: 600;">' + escapeHtml(t.title) + '</span>';
            html += '<span class="ticket-status-badge" style="background: ' + statusColor + '22; color: ' + statusColor + '; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;">' + statusText + '</span>';
            html += '</div>';
            html += '<div style="color: var(--text-muted); font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center;">';
            html += '<div>';
            html += '<span style="font-weight:600;">#' + t.readable_id + '</span> • <span>' + date + '</span>';
            if (t.priority) {
                html += ' • <span style="color: ' + getPriorityColor(t.priority) + ';">' + t.priority + '</span>';
            }
            html += '</div>';
            if (isAwaitingClient) {
                html += '<span class="action-hint" style="background:#8b5cf6;color:white;padding:6px 12px;border-radius:20px;font-size:0.75rem;font-weight:600;"><i class="fa-solid fa-hand-pointer"></i> Подтвердить</span>';
            } else if (isClosed) {
                html += '<span class="closed-hint"><i class="fa-solid fa-check-circle"></i> Закрыта</span>';
            }
            html += '</div>';
            html += '</div>';
        }

        list.innerHTML = html;
    }

    function getStatusColor(status) {
        var s = (status || '').toLowerCase();
        if (s.includes('нов')) return '#3b82f6';
        if (s.includes('работ') || s.includes('ожидан')) return '#f59e0b';
        if (s.includes('реш') || s.includes('закрыт')) return '#10b981';
        return '#8b5cf6';
    }

    function getPriorityColor(priority) {
        var p = (priority || '').toLowerCase();
        if (p.includes('критичн')) return '#ef4444';
        if (p.includes('высок')) return '#f97316';
        if (p.includes('средн')) return '#eab308';
        return '#6b7280';
    }

    function escapeHtml(text) {
        if (!text) return '';
        var div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    async function createTicket() {
        var title = document.getElementById('ticketTitle').value.trim();
        var description = document.getElementById('ticketDescription').value.trim();
        var priority = document.getElementById('ticketPriority').value;
        var btn = document.getElementById('submitBtn');

        if (!title) {
            showToast('❌ Укажите тему обращения');
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Отправка...';

        try {
            var result = await api.createTicket({
                title: title,
                description: description,
                priority: priority
            });

            document.getElementById('ticketTitle').value = '';
            document.getElementById('ticketDescription').value = '';
            document.getElementById('ticketPriority').value = 'medium';

            showToast('✅ Заявка #' + result.readable_id + ' отправлена! Мы скоро свяжемся с вами.');

            setTimeout(function() {
                switchView('dashboard');
            }, 2000);

        } catch (e) {
            showToast('❌ Ошибка: ' + (e.message || 'Не удалось создать заявку'));
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Отправить заявку';
        }
    }

    async function viewTicket(id) {
        try {
            var ticket = await api.getTicket(id);
            showTicketModal(ticket);
        } catch (e) {
            showToast('❌ Ошибка загрузки тикета');
        }
    }

    function showTicketModal(ticket) {
        var modal = document.getElementById('ticketModal');
        if (!modal) {
            modal = document.createElement('div');
            modal.id = 'ticketModal';
            modal.className = 'modal-overlay';
            document.body.appendChild(modal);
        }
        
        var statusColor = getStatusColor(ticket.status_rel?.name || 'новый');
        var priorityColor = getPriorityColor(ticket.priority);
        var isAwaitingClient = ticket.status_rel?.name === 'Ожидает клиента';
        var isClosed = ticket.status_rel?.is_final;
        
        var html = '<div class="modal-content ticket-detail-modal">';
        html += '<button class="modal-close" onclick="closeTicketModal()"><i class="fa-solid fa-times"></i></button>';
        
        // Header
        html += '<div class="ticket-modal-header">';
        html += '<div class="ticket-id-badge">#' + ticket.readable_id + '</div>';
        html += '<h2>' + escapeHtml(ticket.title) + '</h2>';
        html += '</div>';
        
        // Status and Priority badges
        html += '<div class="ticket-meta-row">';
        html += '<span class="status-badge" style="background:' + statusColor + '22;color:' + statusColor + ';border:1px solid ' + statusColor + '44;">' + (ticket.status_rel?.name || 'Новый') + '</span>';
        html += '<span class="priority-badge" style="background:' + priorityColor + '22;color:' + priorityColor + ';">' + (ticket.priority || 'medium') + '</span>';
        html += '</div>';
        
        // SLA Info
        if (ticket.sla_due_at) {
            var slaDate = new Date(ticket.sla_due_at);
            html += '<div class="sla-info">';
            html += '<i class="fa-solid fa-clock"></i> Дедлайн: ' + slaDate.toLocaleString('ru-RU');
            html += '</div>';
        }
        
        // Resolved info
        if (ticket.resolved_at) {
            var resolvedDate = new Date(ticket.resolved_at);
            html += '<div class="resolved-info">';
            html += '<i class="fa-solid fa-check-circle" style="color:#10b981;"></i> Завершено: ' + resolvedDate.toLocaleString('ru-RU');
            html += '</div>';
        }
        
        // Description
        html += '<div class="ticket-description">';
        html += '<h4>Описание</h4>';
        html += '<p>' + escapeHtml(ticket.description || 'Без описания') + '</p>';
        html += '</div>';
        
        // Workflow buttons for client
        html += '<div class="ticket-actions">';
        
        if (isAwaitingClient) {
            html += '<button class="btn btn-success btn-large" onclick="closeTicketByClient(' + ticket.id + ')">';
            html += '<i class="fa-solid fa-check"></i> Подтвердить и закрыть';
            html += '</button>';
            html += '<button class="btn btn-warning" onclick="reopenTicketByClient(' + ticket.id + ')">';
            html += '<i class="fa-solid fa-undo"></i> Переоткрыть';
            html += '</button>';
        }
        
        if (isClosed) {
            html += '<button class="btn btn-secondary" onclick="reopenTicketByClient(' + ticket.id + ')">';
            html += '<i class="fa-solid fa-undo"></i> Переоткрыть тикет';
            html += '</button>';
        }
        
        html += '</div>';
        
        // Rating section (only for closed tickets without rating)
        if (isClosed && !ticket.rating) {
            html += '<div class="rating-section">';
            html += '<h4><i class="fa-solid fa-star" style="color:#f59e0b;"></i> Оцените качество работы</h4>';
            html += '<div class="star-rating" id="starRating">';
            for (var i = 1; i <= 5; i++) {
                html += '<span class="star" data-rating="' + i + '" onclick="selectRating(' + i + ')">☆</span>';
            }
            html += '</div>';
            html += '<textarea id="ratingComment" placeholder="Комментарий (необязательно)"></textarea>';
            html += '<button class="btn btn-primary" onclick="submitRating(' + ticket.id + ')">Отправить оценку</button>';
            html += '</div>';
        }
        
        // Show existing rating
        if (ticket.rating) {
            html += '<div class="existing-rating">';
            html += '<h4>Ваша оценка</h4>';
            html += '<div class="stars-display">';
            for (var i = 1; i <= 5; i++) {
                html += '<span class="star ' + (i <= ticket.rating ? 'filled' : '') + '">★</span>';
            }
            html += '</div>';
            if (ticket.rating_comment) {
                html += '<p class="rating-comment">' + escapeHtml(ticket.rating_comment) + '</p>';
            }
            html += '</div>';
        }
        
        html += '</div>';
        
        modal.innerHTML = html;
        modal.classList.add('active');
    }
    
    function closeTicketModal() {
        var modal = document.getElementById('ticketModal');
        if (modal) modal.classList.remove('active');
        loadTickets();
    }
    
    async function closeTicketByClient(id) {
        if (!confirm('Подтвердить закрытие тикета?')) return;
        try {
            await api.closeTicket(id);
            showToast('✅ Тикет закрыт! Спасибо за обращение.');
            closeTicketModal();
        } catch (e) {
            showToast('❌ Ошибка: ' + (e.message || 'Не удалось закрыть тикет'));
        }
    }
    
    async function reopenTicketByClient(id) {
        var reason = prompt('Укажите причину переоткрытия тикета:');
        if (reason === null) return;
        try {
            await api.reopenTicket(id, reason || 'Клиент переоткрыл тикет');
            showToast('✅ Тикет переоткрыт');
            loadTickets();
            viewTicket(id);
        } catch (e) {
            showToast('❌ Ошибка: ' + (e.message || 'Не удалось переоткрыть тикет'));
        }
    }
    
    var selectedRating = 0;
    
    function selectRating(rating) {
        selectedRating = rating;
        var stars = document.querySelectorAll('#starRating .star');
        stars.forEach(function(star, index) {
            star.textContent = index < rating ? '★' : '☆';
            star.classList.toggle('filled', index < rating);
        });
    }
    
    async function submitRating(id) {
        if (selectedRating === 0) {
            showToast('Пожалуйста, выберите оценку');
            return;
        }
        var comment = document.getElementById('ratingComment').value.trim();
        try {
            await api.rateTicket(id, selectedRating, comment);
            showToast('✅ Спасибо за оценку!');
            closeTicketModal();
        } catch (e) {
            showToast('❌ Ошибка: ' + (e.message || 'Не удалось отправить оценку'));
        }
    }

    function showToast(msg) {
        var toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.remove('hidden', 'fade-out');
        setTimeout(function() {
            toast.classList.add('fade-out');
            setTimeout(function() {
                toast.classList.add('hidden');
            }, 500);
        }, 4000);
    }
    </script>
    <style>
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
        }
        .modal-overlay.active {
            display: flex;
        }
        .ticket-detail-modal {
            background: var(--bg-secondary, #1a1a2e);
            border-radius: 16px;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
